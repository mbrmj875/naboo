
name: Release Windows EXE

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - run: flutter pub get
      - run: flutter build windows --release

      - name: Package release as ZIP
        shell: pwsh
        run: |
          $src = "build\windows\x64\runner\Release"
          if (-not (Test-Path $src)) { $src = "build\windows\runner\Release" }
          Write-Host "Packaging from: $src"
          Compress-Archive -Path "$src\*" -DestinationPath "naboo-windows.zip" -Force
          Get-ChildItem naboo-windows.zip | Format-List

      - name: Create GitHub Release with Windows ZIP
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            naboo-windows.zip
