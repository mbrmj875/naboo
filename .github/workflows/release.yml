# ويندوز فقط: يُبنى naboo-windows-setup.exe + أرشيف portable ويُرفق لإصدار GitHub.
#
# ما يُرفَع صراحةً إلى Release (مرفقات فقط):
#   - naboo-windows-setup.exe  (مثبّت Inno)
#   - naboo-windows.zip        (مجلد Release المُجمَّع — ثنائيات فقط، ليس مشروع Dart)
# لا يوجد في هذا الملف أي أمر لرفع lib/** أو ملفات .dart أو .env.
# ملاحظة: GitHub قد يعرض تلقائياً «Source code (zip)» لكل إصدار — هذا لقطة الوسم في
# المستودع وليس من سطور workflow؛ إن كان المستودع خاصاً فالوصول محصور بحساباتك.
#
# سيقوم Workflow ببناء نسخة ويندوز Naboo-windows-setup.exe ونسخة أندرويد Naboo.apk تلقائياً ورفعها كـ Release.
name: Build & Release (Windows & Android)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "وسم الإصدار الموجود مسبقاً (مثال: v2.0.13)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref }}

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - run: flutter pub get
      - run: flutter build windows --release --dart-define=SUPABASE_URL="${{ secrets.SUPABASE_URL }}" --dart-define=SUPABASE_ANON_KEY="${{ secrets.SUPABASE_ANON_KEY }}"

      - name: Resolve build output path
        id: paths
        shell: pwsh
        run: |
          $src = "build\windows\x64\runner\Release"
          if (-not (Test-Path $src)) { $src = "build\windows\runner\Release" }
          if (-not (Test-Path $src)) { throw "Could not find Flutter Windows build output." }
          Write-Host "Build output: $src"
          $refName = "${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref_name }}"
          $version = $refName.TrimStart('v')
          if ([string]::IsNullOrWhiteSpace($version)) { $version = "0.0.0" }
          Write-Host "Version: $version"
          foreach ($line in @("BUILD_SRC=$src", "APP_VERSION=$version")) {
            [System.IO.File]::AppendAllText($env:GITHUB_OUTPUT, "$line`n", [System.Text.UTF8Encoding]::new($false))
          }

      - name: Package portable ZIP
        shell: pwsh
        run: |
          $src = "${{ steps.paths.outputs.BUILD_SRC }}"
          Compress-Archive -Path "$src\*" -DestinationPath "naboo-windows.zip" -Force
          Get-ChildItem naboo-windows.zip | Format-List

      - name: Build Inno Setup installer
        shell: pwsh
        run: |
          $iscc = Join-Path ${env:ProgramFiles(x86)} "Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            Write-Host "Inno Setup not found in default path; installing via Chocolatey..."
            choco install innosetup -y --no-progress
            $iscc = Join-Path ${env:ProgramFiles(x86)} "Inno Setup 6\ISCC.exe"
          }
          if (-not (Test-Path $iscc)) { throw "Inno Setup compiler (ISCC.exe) not found." }
          $version = "${{ steps.paths.outputs.APP_VERSION }}"
          $srcRel = "${{ steps.paths.outputs.BUILD_SRC }}"
          if (-not (Test-Path $srcRel)) { throw "Release folder not found: $srcRel" }
          # Inno يفسّر BuildSrc النسبي من مجلد naboo-setup.iss فيصبح مساراً خاطئاً — نمرّر مساراً مطلقاً
          $buildSrcAbs = (Resolve-Path $srcRel).Path
          Write-Host "Inno BuildSrc: $buildSrcAbs"
          & $iscc "/DMyAppVersion=$version" "/DBuildSrc=$buildSrcAbs" "/OOutput" "windows\installer\naboo-setup.iss"
          Get-ChildItem Output | Format-List
          Copy-Item "Output\naboo-windows-setup.exe" -Destination "naboo-windows-setup.exe" -Force

      - name: Attach Windows assets to GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          TAG="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref_name }}"
          REPO="${{ github.repository }}"
          if ! gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            gh release create "$TAG" --repo "$REPO" --generate-notes --title "$TAG"
          fi
          gh release upload "$TAG" naboo-windows-setup.exe naboo-windows.zip --clobber --repo "$REPO"
          echo "OK: Windows assets on $TAG (existing APK untouched)"

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref }}

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --dart-define=SUPABASE_URL="${{ secrets.SUPABASE_URL }}" --dart-define=SUPABASE_ANON_KEY="${{ secrets.SUPABASE_ANON_KEY }}"

      - name: Rename APK file
        run: cp build/app/outputs/flutter-apk/app-release.apk naboo.apk

      - name: Attach Android APK to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          TAG="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref_name }}"
          REPO="${{ github.repository }}"
          if ! gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            gh release create "$TAG" --repo "$REPO" --generate-notes --title "$TAG"
          fi
          gh release upload "$TAG" naboo.apk --clobber --repo "$REPO"
          echo "OK: Android APK uploaded on $TAG"
