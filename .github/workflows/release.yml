# إصدار واحد لكل وسم v*: الأندرويد أولاً (ينشئ GitHub Release)، ثم ويندوز يرفق المثبّت.
# يمنع السباق بين workflow منفصلين كان يسبب فشل Windows.
name: Release Android and Windows

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  android:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get
      - run: flutter build apk --release --split-per-abi

      - name: Rename artifacts for website / latest download
        run: |
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk naboo.apk
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk naboo-arm32.apk
          ls -la naboo.apk naboo-arm32.apk

      - name: Create GitHub Release with APK assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            naboo.apk
            naboo-arm32.apk

  windows:
    name: Windows installer
    needs: android
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - run: flutter pub get
      - run: flutter build windows --release

      - name: Resolve build output path
        id: paths
        shell: pwsh
        run: |
          $src = "build\windows\x64\runner\Release"
          if (-not (Test-Path $src)) { $src = "build\windows\runner\Release" }
          if (-not (Test-Path $src)) { throw "Could not find Flutter Windows build output." }
          Write-Host "Build output: $src"
          $refName = "${{ github.ref_name }}"
          $version = $refName.TrimStart('v')
          if ([string]::IsNullOrWhiteSpace($version)) { $version = "0.0.0" }
          Write-Host "Version: $version"
          foreach ($line in @("BUILD_SRC=$src", "APP_VERSION=$version")) {
            [System.IO.File]::AppendAllText($env:GITHUB_OUTPUT, "$line`n", [System.Text.UTF8Encoding]::new($false))
          }

      - name: Package portable ZIP
        shell: pwsh
        run: |
          $src = "${{ steps.paths.outputs.BUILD_SRC }}"
          Compress-Archive -Path "$src\*" -DestinationPath "naboo-windows.zip" -Force
          Get-ChildItem naboo-windows.zip | Format-List

      - name: Build Inno Setup installer
        shell: pwsh
        run: |
          $iscc = Join-Path ${env:ProgramFiles(x86)} "Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            Write-Host "Inno Setup not found in default path; installing via Chocolatey..."
            choco install innosetup -y --no-progress
            $iscc = Join-Path ${env:ProgramFiles(x86)} "Inno Setup 6\ISCC.exe"
          }
          if (-not (Test-Path $iscc)) { throw "Inno Setup compiler (ISCC.exe) not found." }
          $version = "${{ steps.paths.outputs.APP_VERSION }}"
          $src = "${{ steps.paths.outputs.BUILD_SRC }}"
          & $iscc "/DMyAppVersion=$version" "/DBuildSrc=$src" "/OOutput" "windows\installer\naboo-setup.iss"
          Get-ChildItem Output | Format-List
          Copy-Item "Output\naboo-windows-setup.exe" -Destination "naboo-windows-setup.exe" -Force

      - name: Upload Windows assets to release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          TAG="${{ github.ref_name }}"
          gh release upload "$TAG" naboo-windows-setup.exe naboo-windows.zip --clobber --repo "${{ github.repository }}"
          echo "Uploaded Windows assets to $TAG"
