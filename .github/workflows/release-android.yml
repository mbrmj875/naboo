# عند دفع وسم إصدار (مثل v2.0.1) يُبنى APK ويُرفَق تلقائياً بـ GitHub Release.
# الروابط في موقع naboo تستخدم: .../releases/latest/download/naboo.apk
name: Release Android APK

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get
      - run: flutter build apk --release --split-per-abi

      - name: Rename artifacts for website / latest download
        run: |
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk naboo.apk
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk naboo-arm32.apk
          ls -la naboo.apk naboo-arm32.apk

      - name: Create GitHub Release with APK assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            naboo.apk
            naboo-arm32.apk
